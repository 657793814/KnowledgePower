services:
  mysql:
    image: mysql:8.0
    container_name: knowledgepower-mysql
    environment:
      MYSQL_ROOT_PASSWORD: root1234
      MYSQL_DATABASE: knowledgepower
    ports:
      - "3306:3306"
    volumes:
      - mysql_data:/var/lib/mysql
      - ../server/src/main/resources/db/init.sql:/docker-entrypoint-initdb.d/init.sql
    command: --character-set-server=utf8mb4 --collation-server=utf8mb4_unicode_ci
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-u", "root", "-proot1234"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - knowledgepower

  redis:
    image: redis:7-alpine
    container_name: knowledgepower-redis
    environment:
      REDIS_PASSWORD: liuzd..0
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    command: redis-server --requirepass liuzd..0
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "liuzd..0", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - knowledgepower

  etcd:
    image: quay.io/coreos/etcd:v3.5.5
    container_name: knowledgepower-etcd
    environment:
      ETCD_AUTO_COMPACTION_MODE: revision
      ETCD_AUTO_COMPACTION_RETENTION: "1000"
      ETCD_QUOTA_BACKEND_BYTES: "4294967296"
      ETCD_DISABLE_STATS: "true"
    volumes:
      - etcd_data:/etcd
    command:
      - etcd
      - --advertise-client-urls=http://0.0.0.0:2379
      - --listen-client-urls=http://0.0.0.0:2379
      - --data-dir=/etcd
    healthcheck:
      test: ["CMD", "etcdctl", "endpoint", "health"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - knowledgepower

  minio:
    image: minio/minio:RELEASE.2023-03-20T20-16-18Z
    container_name: knowledgepower-minio
    environment:
      MINIO_ACCESS_KEY: minioadmin
      MINIO_SECRET_KEY: minioadmin
    ports:
      - "9000:9000"
      - "9001:9001"
    volumes:
      - minio_data:/minio_data
    command: minio server /minio_data --console-address ":9001"
    healthcheck:
      test: ["CMD", "curl", "-sf", "http://localhost:9000/minio/health/live"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - knowledgepower

  milvus:
    image: milvusdb/milvus:v2.5.4
    container_name: knowledgepower-milvus
    ports:
      - "19530:19530"
      - "9091:9091"
    volumes:
      - milvus_data:/var/lib/milvus
    environment:
      ETCD_ENDPOINTS: etcd:2379
      MINIO_ADDRESS: minio:9000
      MINIO_ACCESS_KEY: minioadmin
      MINIO_SECRET_KEY: minioadmin
    command: milvus run standalone
    healthcheck:
      test: ["CMD", "curl", "-sf", "http://localhost:9091/api/v1/health"]
      interval: 10s
      timeout: 5s
      retries: 20
    depends_on:
      etcd:
        condition: service_healthy
      minio:
        condition: service_healthy
    networks:
      - knowledgepower

  attu:
    image: zilliz/attu:v2.3.7
    container_name: knowledgepower-attu
    ports:
      - "8088:3000"
    environment:
      MILVUS_URL: milvus:19530
    healthcheck:
      test: ["CMD", "curl", "-sf", "http://localhost:3000/health"]
      interval: 10s
      timeout: 5s
      retries: 10
    depends_on:
      milvus:
        condition: service_healthy
    networks:
      - knowledgepower

networks:
  knowledgepower:
    driver: bridge

volumes:
  mysql_data:
  redis_data:
  etcd_data:
  minio_data:
  milvus_data: